<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Lag Tracker</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 80%; max-width: 600px; text-align: center; }
        .status-box { margin: 20px 0; padding: 20px; border-radius: 10px; font-size: 1.2em; font-weight: bold; }
        .live { background: #2e7d32; } /* Green */
        .finished { background: #c62828; } /* Red */
        .alert { background: #f57f17; animation: blink 1s infinite; } /* Orange Blink */
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        button { padding: 15px 30px; font-size: 1em; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; }
        .timer { font-size: 3em; margin: 10px 0; font-family: monospace; }
        .log { text-align: left; background: #000; padding: 10px; height: 150px; overflow-y: scroll; font-size: 0.8em; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Horse Race Lag Checker</h2>
    <p>Manual Simulation Mode</p>

    <div id="statusDisplay" class="status-box live">RACE STATUS: IN PROGRESS</div>
    
    <div class="timer" id="timerDisplay">00:00:00</div>

    <div style="display: flex; gap: 10px; justify-content: center;">
        <button onclick="simulateFinish()">SIMULATE FINISH</button>
        <button onclick="resetTracker()" style="background: #555;">RESET</button>
    </div>

    <h3>System Logs</h3>
    <div class="log" id="logBox">
        [System] Ready to track...<br>
    </div>
</div>

<script>
    let startTime;
    let running = false;

    function simulateFinish() {
        const status = document.getElementById('statusDisplay');
        const log = document.getElementById('logBox');
        
        status.innerText = "OFFICIAL STATUS: FINISHED";
        status.className = "status-box finished";
        log.innerHTML += `<span style="color: red;">[${new Date().toLocaleTimeString()}] Official Result Received: RACE ENDED</span><br>`;
        
        // Start the "Opportunity Window" timer
        startTime = Date.now();
        running = true;
        updateTimer();
        
        log.innerHTML += `<span style="color: #4caf50;">[System] Checking bookie lag... if betting is still open, you have a window!</span><br>`;
    }

    function updateTimer() {
        if (!running) return;
        const now = Date.now();
        const diff = now - startTime;
        const seconds = (diff / 1000).toFixed(2);
        document.getElementById('timerDisplay').innerText = seconds + "s";
        
        if (seconds > 5) {
            document.getElementById('statusDisplay').className = "status-box alert";
            document.getElementById('statusDisplay').innerText = "LAG DETECTED - MARKET SHOULD BE CLOSED";
        }
        
        requestAnimationFrame(updateTimer);
    }

    function resetTracker() {
        running = false;
        document.getElementById('timerDisplay').innerText = "00:00:00";
        const status = document.getElementById('statusDisplay');
        status.innerText = "RACE STATUS: IN PROGRESS";
        status.className = "status-box live";
        document.getElementById('logBox').innerHTML += "[System] Resetting...<br>";
    }
</script>

</body>
</html>
