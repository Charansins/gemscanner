<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4rabet Lag Detective Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: #eaecef; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #1e2329; border-radius: 12px; padding: 20px; border: 1px solid #333; }
        h1, h2 { color: #f0b90b; }
        .race-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #2b3139; }
        .btn-check { background: #f0b90b; color: black; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .timer-active { font-size: 2.5em; color: #f0b90b; margin: 10px 0; }
        
        /* The Blink Alert */
        @keyframes lag-alert {
            0% { background-color: #1e2329; }
            50% { background-color: #ff4d4d; }
            100% { background-color: #f57f17; }
        }
        .blinking { animation: lag-alert 0.5s infinite; color: white !important; }
    </style>
</head>
<body>

<h1>🏆 Global Racing Tracker - April 20, 2026</h1>

<div class="grid">
    <div class="card" id="horseCard">
        <h2>🏇 Horse Racing Centers</h2>
        <div class="race-row"><span>Hyderabad (IN)</span> <span>14:30 IST</span></div>
        <div class="race-row"><span>Longchamp (FR)</span> <span>15:45 CET</span></div>
        <div class="race-row"><span>Cheltenham (UK)</span> <span>18:00 GMT</span></div>
        <button class="btn-check" onclick="startCheck('horseCard')">START LAG CHECK (Race Finished)</button>
        <div class="timer-active" id="horseTimer">0.00s</div>
    </div>

    <div class="card" id="greyCard">
        <h2>🐕 Greyhound Racing</h2>
        <div class="race-row"><span>Crayford (UK)</span> <span>11:15 GMT</span></div>
        <div class="race-row"><span>Wheeling (US)</span> <span>13:00 EST</span></div>
        <button class="btn-check" onclick="startCheck('greyCard')">START LAG CHECK (Race Finished)</button>
        <div class="timer-active" id="greyTimer">0.00s</div>
    </div>

    <div class="card" id="harnessCard">
        <h2>🚜 Harness Racing</h2>
        <div class="race-row"><span>Vincennes (FR)</span> <span>16:20 CET</span></div>
        <div class="race-row"><span>Yonkers (US)</span> <span>19:00 EST</span></div>
        <button class="btn-check" onclick="startCheck('harnessCard')">START LAG CHECK (Race Finished)</button>
        <div class="timer-active" id="harnessTimer">0.00s</div>
    </div>
</div>

<script>
    function startCheck(cardId) {
        let startTime = Date.now();
        let card = document.getElementById(cardId);
        let timerDisplay = card.querySelector('.timer-active');
        
        let interval = setInterval(() => {
            let elapsed = (Date.now() - startTime) / 1000;
            timerDisplay.innerText = elapsed.toFixed(2) + "s";
            
            // If the race ended 10 seconds ago and 4rabet is still open...
            if (elapsed > 10) {
                card.classList.add('blinking');
                timerDisplay.innerText = "LAG DETECTED: " + elapsed.toFixed(2) + "s";
            }
            
            // Stop after 40 seconds
            if (elapsed > 40) {
                clearInterval(interval);
                card.classList.remove('blinking');
            }
        }, 100);
    }
</script>

</body>
</html>
