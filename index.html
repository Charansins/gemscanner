<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GemScanner AI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090c;--s1:#0e1116;--s2:#13161d;--s3:#181d27;
  --b1:#1f2636;--b2:#2a3347;
  --g:#00ff88;--ga:rgba(0,255,136,.1);
  --r:#ff3d5a;--y:#ffc107;--bl:#29b6f6;--pu:#ce93d8;
  --t1:#eef2ff;--t2:#7b8db0;--t3:#3d4e6b;--t4:#1c2535;
  --fh:'Outfit',sans-serif;--fm:'JetBrains Mono',monospace;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--fh);min-height:100vh}
#setup{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.sbox{background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:26px 20px;width:100%;max-width:400px}
.s-logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.s-title{font-size:20px;font-weight:900;background:linear-gradient(100deg,#00ff88,#29b6f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.s-sub{font-size:8px;font-family:var(--fm);color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.s-info{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);border-radius:8px;padding:12px;margin-bottom:16px;font-size:11px;color:var(--t2);font-family:var(--fm);line-height:1.8}
.s-info b{color:var(--g)}
.s-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block}
.s-hint{font-size:10px;color:var(--t3);font-family:var(--fm);margin-bottom:10px;line-height:1.6}
.s-hint a{color:var(--bl);text-decoration:none}
.s-input{width:100%;background:var(--bg);border:1px solid var(--b2);border-radius:8px;padding:12px 13px;font-family:var(--fm);font-size:12px;color:var(--t1);outline:none;transition:border-color .2s;margin-bottom:14px}
.s-input:focus{border-color:var(--g)}
.s-input::placeholder{color:var(--t4)}
.s-err{font-size:10px;color:var(--r);font-family:var(--fm);margin-bottom:10px;display:none;padding:7px 10px;background:rgba(255,61,90,.08);border-radius:6px;border:1px solid rgba(255,61,90,.2);line-height:1.6}
.s-btn{width:100%;padding:13px;border-radius:9px;border:none;background:linear-gradient(135deg,#00ff88,#00cc6a);font-family:var(--fm);font-size:13px;font-weight:700;color:#000;cursor:pointer;letter-spacing:.04em}
.s-btn:active{opacity:.85}
.s-warn{font-size:9px;color:var(--t3);font-family:var(--fm);margin-top:12px;line-height:1.7;text-align:center}
#app{display:none}
header{position:sticky;top:0;z-index:100;background:rgba(8,9,12,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--b1);padding:10px 14px}
.h1{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.h-logo{display:flex;align-items:center;gap:8px;flex:1}
.h-title{font-size:16px;font-weight:900;letter-spacing:-.04em;background:linear-gradient(100deg,#00ff88,#29b6f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.h-sub{font-size:8px;font-family:var(--fm);color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.ws-pill{display:flex;align-items:center;gap:5px;font-family:var(--fm);font-size:10px;color:var(--t3);padding:4px 9px;background:var(--s1);border:1px solid var(--b1);border-radius:20px}
.led{width:7px;height:7px;border-radius:50%;background:var(--t4);flex-shrink:0;transition:all .3s}
.led.on{background:var(--g);box-shadow:0 0 7px var(--g);animation:pp 2s ease-in-out infinite}
.led.err{background:var(--r)}.led.con{background:var(--y);animation:pp .5s ease-in-out infinite}
@keyframes pp{0%,100%{opacity:1}50%{opacity:.4}}
.h2{display:flex;gap:5px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:4px;padding:4px 9px;background:var(--s2);border:1px solid var(--b1);border-radius:6px;font-family:var(--fm);font-size:10px;color:var(--t2)}
.chip b{font-weight:700;font-size:11px}
.chip.g b{color:var(--g)}.chip.r b{color:var(--r)}.chip.bl b{color:var(--bl)}.chip.y b{color:var(--y)}
.scanbtn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--b2);background:transparent;font-family:var(--fm);font-size:11px;font-weight:700;color:var(--t1);cursor:pointer;transition:all .2s;white-space:nowrap;margin-left:auto}
.scanbtn:active,.scanbtn.on{border-color:var(--g);color:var(--g);background:var(--ga)}
.scanbtn .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.scanbtn.on .dot{animation:pp .7s ease-in-out infinite}
.statsbar{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:8px 14px;border-bottom:1px solid var(--b1)}
.sc{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:7px 8px;text-align:center}
.sc-n{font-size:17px;font-weight:800;font-family:var(--fm);letter-spacing:-.03em}
.sc-l{font-size:7px;color:var(--t3);font-family:var(--fm);text-transform:uppercase;letter-spacing:.07em;margin-top:1px}
.sc.g .sc-n{color:var(--g)}.sc.r .sc-n{color:var(--r)}.sc.y .sc-n{color:var(--y)}.sc.bl .sc-n{color:var(--bl)}
.fbar{display:flex;gap:5px;padding:8px 14px;border-bottom:1px solid var(--b1);overflow-x:auto;-webkit-overflow-scrolling:touch}
.fbar::-webkit-scrollbar{display:none}
.fb{padding:5px 11px;border-radius:6px;border:1px solid var(--b1);background:transparent;font-family:var(--fm);font-size:10px;font-weight:600;color:var(--t3);cursor:pointer;white-space:nowrap}
.fb.on{border-color:var(--g);color:var(--g);background:var(--ga)}
.stbar{padding:5px 14px;font-family:var(--fm);font-size:10px;color:var(--t3);background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:6px;min-height:26px}
.sl{width:6px;height:6px;border-radius:50%;background:var(--t4);flex-shrink:0}
.sl.an{background:var(--bl);animation:pp .8s ease-in-out infinite}
.sl.ok{background:var(--g)}.sl.er{background:var(--r)}
.gstrip{padding:9px 14px;border-bottom:1px solid var(--b1);background:var(--s1);display:none}
.gt{font-size:9px;font-family:var(--fm);font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.12em;margin-bottom:7px}
.gs-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch}
.gs-scroll::-webkit-scrollbar{display:none}
.gcell{flex-shrink:0;width:165px;background:var(--s2);border:1px solid rgba(0,255,136,.25);border-radius:10px;padding:9px;cursor:pointer;position:relative;overflow:hidden}
.gcell::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--g),var(--bl))}
.gc-h{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.gc-img{width:24px;height:24px;border-radius:5px;object-fit:cover;background:var(--s3);flex-shrink:0}
.gc-fb{width:24px;height:24px;border-radius:5px;background:var(--s3);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:var(--t3);flex-shrink:0}
.gc-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.gc-sym{font-family:var(--fm);font-size:8px;color:var(--t3);margin-bottom:4px}
.gc-stars{display:flex;gap:1px;margin-bottom:5px}
.gstar{font-size:10px}.gstar.on{color:#ffd600}.gstar.off{color:var(--b1)}
.gc-ca{font-family:var(--fm);font-size:8px;color:var(--t3);background:var(--bg);border:1px solid var(--b1);border-radius:4px;padding:4px 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:5px;cursor:pointer;display:block}
.gc-ca:active{color:var(--g)}
.gc-pump{display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:9px;font-weight:700;color:var(--g);padding:4px;border:1px solid rgba(0,255,136,.2);border-radius:4px;cursor:pointer}
.gc-pump:active{background:var(--ga)}
.feed{padding:7px 14px;display:flex;flex-direction:column;gap:5px}
.fempty{text-align:center;padding:50px 20px;font-family:var(--fm);font-size:11px;color:var(--t3);line-height:2.3}
.fempty b{color:var(--g)}
.tcard{background:var(--s1);border:1px solid var(--b1);border-radius:11px;padding:11px 13px 11px 16px;cursor:pointer;position:relative;overflow:hidden}
.tcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.tcard.s5::before{background:linear-gradient(180deg,#00ff88,#00cc6a)}
.tcard.s4::before{background:#4cdf9f}
.tcard.s3::before{background:#ffc107}
.tcard.s2::before{background:#ff8c42}
.tcard.s1::before{background:#ff3d5a}
.tcard.pend::before{background:var(--bl);animation:pp 1s ease-in-out infinite}
.tcard:active{background:var(--s2)}
.tc1{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.tcimg{width:40px;height:40px;border-radius:9px;object-fit:cover;background:var(--s3);flex-shrink:0;border:1px solid var(--b1)}
.tcfb{width:40px;height:40px;border-radius:9px;background:var(--s3);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--t3);flex-shrink:0}
.tci{flex:1;min-width:0}
.tcr1{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap}
.tcname{font-size:14px;font-weight:700;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px}
.tcsym{font-family:var(--fm);font-size:9px;color:var(--t3);background:var(--s3);border:1px solid var(--b1);padding:1px 5px;border-radius:3px;flex-shrink:0}
.tcv{font-size:9px;font-family:var(--fm);font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.05em;flex-shrink:0}
.vg{background:rgba(0,255,136,.15);color:#00ff88;border:1px solid rgba(0,255,136,.35)}
.vgo{background:rgba(76,223,159,.12);color:#4cdf9f;border:1px solid rgba(76,223,159,.3)}
.vw{background:rgba(255,193,7,.12);color:#ffc107;border:1px solid rgba(255,193,7,.3)}
.vs{background:rgba(255,140,66,.1);color:#ff8c42;border:1px solid rgba(255,140,66,.25)}
.va{background:rgba(255,61,90,.12);color:#ff3d5a;border:1px solid rgba(255,61,90,.3)}
.vp{background:rgba(41,182,246,.1);color:var(--bl);border:1px solid rgba(41,182,246,.3);animation:pp 1.2s ease-in-out infinite}
.tcr2{display:flex;align-items:center;gap:6px}
.tcage{font-family:var(--fm);font-size:9px;color:var(--t3)}
.tcsoc{font-family:var(--fm);font-size:9px}
.tcstars{display:flex;gap:1px;margin-left:auto}
.tstar{font-size:12px}.tstar.on{color:#ffd600}.tstar.off{color:var(--b1)}
.tctags{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.tag{font-size:9px;font-family:var(--fm);padding:2px 6px;border-radius:3px;border:1px solid;font-weight:600}
.tok{color:#00ff88;border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.07)}
.twarn{color:#ffc107;border-color:rgba(255,193,7,.3);background:rgba(255,193,7,.07)}
.tbad{color:#ff3d5a;border-color:rgba(255,61,90,.3);background:rgba(255,61,90,.07)}
.tpend{color:var(--t4);border-color:var(--b1);animation:pp 1.5s ease-in-out infinite}
.dov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;backdrop-filter:blur(4px)}
.dov.open{display:block}
.drawer{position:fixed;bottom:0;left:0;right:0;max-height:92vh;background:var(--s1);border-top:1px solid var(--b2);border-radius:20px 20px 0 0;z-index:201;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,.86,.64,1);-webkit-overflow-scrolling:touch}
.drawer.open{transform:translateY(0)}
.dhandle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:12px auto 0;cursor:pointer}
.dbody{padding:14px 16px 40px}
.drhead{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.drimg{width:54px;height:54px;border-radius:11px;object-fit:cover;background:var(--s3);border:1px solid var(--b1);flex-shrink:0}
.drfb{width:54px;height:54px;border-radius:11px;background:var(--s3);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:var(--t3);flex-shrink:0}
.drname{font-size:20px;font-weight:800;letter-spacing:-.04em;margin-bottom:4px;line-height:1.2}
.drsym{font-family:var(--fm);font-size:10px;color:var(--t2);background:var(--s3);border:1px solid var(--b2);padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:7px}
.socrow{display:flex;gap:5px;flex-wrap:wrap}
.soc{display:flex;align-items:center;gap:3px;padding:4px 9px;border-radius:5px;border:1px solid var(--b2);font-family:var(--fm);font-size:10px;text-decoration:none;cursor:pointer}
.soc.tw{color:var(--bl)}.soc.tg{color:var(--pu)}.soc.web{color:var(--y)}
.bstars{display:flex;gap:3px;margin:11px 0 3px}
.bstar{font-size:25px}.bstar.on{color:#ffd600;text-shadow:0 0 10px rgba(255,214,0,.5)}.bstar.off{color:var(--b1)}
.brating{font-size:14px;font-weight:700;margin-bottom:3px}
.bconf{font-family:var(--fm);font-size:10px;color:var(--t3);margin-bottom:11px}
.rugbar{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:7px;font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:.04em;margin-bottom:10px}
.rl{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.25);color:#00ff88}
.rm{background:rgba(255,193,7,.08);border:1px solid rgba(255,193,7,.25);color:#ffc107}
.rh{background:rgba(255,61,90,.1);border:1px solid rgba(255,61,90,.3);color:#ff3d5a}
.gemq{font-size:13px;font-style:italic;color:var(--t2);padding:10px 13px;background:var(--s2);border-radius:0 7px 7px 0;margin-bottom:13px;line-height:1.65}
.slbl{font-size:9px;font-family:var(--fm);font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;margin-top:15px;display:flex;align-items:center;gap:8px}
.slbl::after{content:'';flex:1;height:1px;background:var(--b1)}
.sigg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sigc{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:8px 10px}
.sigcn{font-size:8px;font-family:var(--fm);color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px}
.sigcv{font-size:11px;font-family:var(--fm);font-weight:600;margin-bottom:4px;line-height:1.3}
.sigc.ok .sigcv{color:#00ff88}.sigc.warn .sigcv{color:#ffc107}.sigc.bad .sigcv{color:#ff3d5a}
.sigcb{height:2px;background:var(--s3);border-radius:1px;overflow:hidden}
.sigcf{height:100%;border-radius:1px}
.sigc.ok .sigcf{background:#00ff88}.sigc.warn .sigcf{background:#ffc107}.sigc.bad .sigcf{background:#ff3d5a}
.reas{background:var(--s2);border:1px solid var(--b2);border-radius:9px;padding:12px;font-size:13px;line-height:1.8;color:var(--t2)}
.rug{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rubox{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:9px 11px}
.rutit{font-size:8px;font-family:var(--fm);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.rubox.ri .rutit{color:#ff3d5a}.rubox.up .rutit{color:#00ff88}
.rui{font-size:11px;color:var(--t2);display:flex;gap:5px;padding:2px 0;line-height:1.55}
.rubox.ri .ic{color:#ff3d5a}.rubox.up .ic{color:#00ff88}
.ic{font-size:10px;flex-shrink:0;margin-top:2px}
.gcabox{background:var(--bg);border:1px solid rgba(0,255,136,.4);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.gcabox::before{content:'';position:absolute;top:-20px;right:-20px;width:70px;height:70px;background:radial-gradient(circle,rgba(0,255,136,.1),transparent 70%);pointer-events:none}
.gbadge{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:10px;font-weight:700;color:var(--g);padding:3px 10px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);border-radius:4px;margin-bottom:10px}
.cabox{display:flex;align-items:center;gap:7px;background:var(--s1);border:1px solid var(--b2);border-radius:7px;padding:10px 11px;cursor:pointer;margin-bottom:9px}
.cabox:active{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.05)}
.cat{font-family:var(--fm);font-size:11px;color:var(--t1);flex:1;word-break:break-all;line-height:1.5}
.cabtn{font-family:var(--fm);font-size:10px;font-weight:700;padding:6px 11px;background:var(--s2);border:1px solid var(--b2);border-radius:5px;color:var(--t3);cursor:pointer;flex-shrink:0;white-space:nowrap}
.cabtn.ok{color:var(--g);border-color:rgba(0,255,136,.35);background:rgba(0,255,136,.08)}
.plink{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);border-radius:8px;color:#00ff88;font-family:var(--fm);font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.05em}
.plink:active{background:rgba(0,255,136,.2)}
.pca{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;padding:9px 11px;cursor:pointer;margin-bottom:8px}
.pcat{font-family:var(--fm);font-size:10px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcac{font-family:var(--fm);font-size:9px;color:var(--t3);padding:3px 8px;background:var(--bg);border:1px solid var(--b1);border-radius:4px;flex-shrink:0}
.rawbox{background:var(--bg);border:1px solid var(--b1);border-radius:7px;padding:9px 11px;font-family:var(--fm);font-size:9px;color:var(--t3);line-height:2;word-break:break-all}
.rawr{display:flex;gap:8px;border-bottom:1px solid var(--b1);padding:1px 0}
.rawr:last-child{border:none}
.rawk{color:var(--t2);min-width:85px;flex-shrink:0}.rawv{color:var(--t1)}

.notif.show{transform:translateX(-50%) translateY(0)}
.nico{font-size:20px;flex-shrink:0}
.nname{font-size:12px;font-weight:700;color:#00ff88;margin-bottom:2px}
.nca{font-family:var(--fm);font-size:9px;color:var(--t3)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

</head>
<body>

<div id="setup" style="position:fixed;inset:0;background:#08090c;z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto">
  <div style="background:#0e1116;border:1px solid #2a3347;border-radius:16px;padding:28px 20px;width:100%;max-width:400px">
    <div style="font-size:22px;font-weight:900;background:linear-gradient(100deg,#00ff88,#29b6f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px">GemScanner AI</div>
